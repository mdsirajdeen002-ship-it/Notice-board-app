<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect 🎓</title>
    <style>
        :root {
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent: #ff007a;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text: #2d3436;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f0f2f5;
            background-image: radial-gradient(#667eea 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 40px 20px;
            background: var(--gradient);
            color: white;
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.3);
            margin-bottom: 40px;
        }

        .hero h1 { margin: 0; font-size: 2.5rem; }
        .hero p { opacity: 0.9; font-size: 1.1rem; }

        /* Input Section */
        .glass-form {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: #667eea; outline: none; }

        .post-btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .post-btn:hover { transform: scale(1.02); }

        /* Grid Layout */
        #noticeBoard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            position: relative;
            transition: 0.3s;
            border-bottom: 5px solid #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .card h3 { margin: 0; color: #764ba2; font-size: 1.4rem; }
        .card p { color: #555; line-height: 1.6; margin: 15px 0; }
        
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #999;
        }

        .user-badge {
            background: #f0f2f5;
            padding: 5px 12px;
            border-radius: 10px;
            color: #667eea;
        }

        .del-btn {
            background: #fff0f0;
            color: #ff4d4d;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .del-btn:hover { background: #ff4d4d; color: white; }

    </style>
</head>
<body>

    <div class="hero">
        <h1>Campus Connect 🎓✨</h1>
        <p>What's happening on campus today? 🤔</p>
    </div>

    <div class="glass-form">
        <input id="title" placeholder="⚡ Catchy Title...">
        <textarea id="content" placeholder="📝 Share the details (Events, Clubs, Lost & Found)..." rows="3"></textarea>
        <input id="postedBy" placeholder="🙋‍♂️ Your Nickname">
        <button class="post-btn" onclick="sendData()">Drop Notice 🚀</button>
    </div>

    <div id="noticeBoard">
        <!-- Notices flash here -->
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/notices';

        function loadNotices() {
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    const board = document.getElementById('noticeBoard');
                    board.innerHTML = ''; 
                    data.forEach(n => {
                        board.innerHTML += `
                            <div class="card">
                                <h3>📌 ${n.title}</h3>
                                <p>${n.content}</p>
                                <div class="card-meta">
                                    <span class="user-badge">👤 ${n.postedBy}</span>
                                    <button class="del-btn" onclick="deleteNotice(${n.id})">🗑️ Delete</button>
                                </div>
                            </div>`;
                    });
                });
        }

        function sendData() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const postedBy = document.getElementById('postedBy').value;

            if(!title || !content || !postedBy) return alert("Hey! Fill everything first! 😅");

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, postedBy })
            }).then(() => {
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('postedBy').value = '';
                loadNotices();
            });
        }

        function deleteNotice(id) {
            if(confirm("Bye bye notice? 😢")) {
                fetch(`${API_URL}/${id}`, { method: 'DELETE' }).then(() => loadNotices());
            }
        }

        loadNotices();
    </script>
</body>
</html>
